name: Benchmark

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark Comparison
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      BENCH_COUNT: 5
      BENCH_TIME: 1s
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260312031701-16a31bc5fbd0

      - name: Find changed benchmark packages
        id: find-bench
        run: |
          CHANGED_PKGS=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- '*.go' \
            | xargs -I{} dirname {} \
            | sort -u \
            | while read -r dir; do
                pkg="./${dir}"
                if grep -rql 'func Benchmark' "${dir}"/*.go 2>/dev/null; then
                  echo "${pkg}"
                fi
              done \
            | paste -sd ' ' -)

          if [ -z "${CHANGED_PKGS}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No benchmark packages changed in this PR"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "packages=${CHANGED_PKGS}" >> "$GITHUB_OUTPUT"
            echo "Benchmark packages: ${CHANGED_PKGS}"
          fi

      - name: Run base benchmarks
        if: steps.find-bench.outputs.skip == 'false'
        run: |
          git checkout "${{ github.event.pull_request.base.sha }}"
          go test -run='^$' -bench='.' -benchmem \
            -count="${BENCH_COUNT}" -benchtime="${BENCH_TIME}" \
            ${{ steps.find-bench.outputs.packages }} \
            > /tmp/base.txt 2>&1 || true
          git checkout -

      - name: Run PR benchmarks
        if: steps.find-bench.outputs.skip == 'false'
        run: |
          go test -run='^$' -bench='.' -benchmem \
            -count="${BENCH_COUNT}" -benchtime="${BENCH_TIME}" \
            ${{ steps.find-bench.outputs.packages }} \
            > /tmp/pr.txt 2>&1 || true

      - name: Compare benchmarks
        if: steps.find-bench.outputs.skip == 'false'
        id: benchstat
        run: |
          {
            echo 'result<<EOF'
            benchstat /tmp/base.txt /tmp/pr.txt 2>&1 || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post benchmark results
        if: steps.find-bench.outputs.skip == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const body = `## Benchmark Results

            \`\`\`
            ${{ steps.benchstat.outputs.result }}
            \`\`\`
            `;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Benchmark Results')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
